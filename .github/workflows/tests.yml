name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      matrix:
        ddev_version: [stable]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: ddev/github-action-add-on-test@v2
        with:
          ddev_version: ${{ matrix.ddev_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          debug_enabled: false
          addon_repository: ${{ github.repository }}
          addon_ref: ${{ github.ref }}
