name: coolify-bootstrap

# Installed into the project's .ddev/ by `ddev add-on get vanWittlaer/ddev-coolify-shopware`.
project_files:
  - web-build/Dockerfile.opentofu
  - commands/web/coolify-bootstrap
  - coolify-bootstrap

ddev_version_constraint: '>= v1.24.0'

post_install_actions:
  - |
    #ddev-description:Show next steps
    echo "ddev-coolify-shopware installed. Next steps:"
    echo "  1. ddev restart                  # bake OpenTofu into the web container"
    echo "  2. ddev coolify-bootstrap init   # scaffold infra/ (fresh projects only)"
    echo "  3. fill in infra/*.tfvars, then: ddev coolify-bootstrap up"
